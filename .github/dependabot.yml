version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Group only minor + patch updates so majors come through as individual,
    # reviewable PRs. Bundling majors (TypeScript 5->6, ESLint 9->10,
    # Vitest 2->4, etc.) makes bisectability impossible if anything regresses
    # and delays small security patches that would otherwise auto-merge.
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      production-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # The CDK packages are standalone (own package.json + lockfile), not part of
  # the root workspaces, so they need their own entries. The root "/" entry
  # above covers the workspaces (apps/_demo, services/_template, packages/spec-test).
  - package-ecosystem: "npm"
    directory: "/infra/cdk/_setup"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/infra/cdk/_template"
    schedule:
      interval: "weekly"
