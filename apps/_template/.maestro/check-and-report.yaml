# Maestro e2e flow. The flow `name` carries the spec [ID]; `spec-maestro` reads
# it from Maestro's JUnit output and records coverage. Run:
#   maestro test .maestro --format junit --output maestro.xml
#   spec-maestro --report maestro.xml
appId: com.elleskay.yourapp
name: "[EX-CHECK-001] check a suspicious message shows a verdict"
---
- launchApp:
    clearState: true
# Wait for the Check screen to mount before tapping. A cold release-APK launch
# in CI can outlast tapOn's default retry window, which surfaces as a flaky
# "Element not found" on the first interaction.
- extendedWaitUntil:
    visible:
      id: "message-input"
    timeout: 30000
- tapOn:
    id: "message-input"
- inputText: "URGENT verify your bank http://evil.example"
- tapOn:
    id: "check-button"
- assertVisible:
    id: "verdict"
