# Journey-level e2e: report a flagged message and see the confirmation. Covers
# the full path the decomposed-journey trap hides in (UI -> API -> queue ->
# receipt). The flow name carries the spec [ID].
appId: com.elleskay.yourapp
name: "[EX-REPORT-001] submit a report and receive a confirmation"
---
- launchApp:
    clearState: true
# Wait for the Check screen to mount before tapping. A cold release-APK launch
# in CI can outlast tapOn's default retry window, which surfaces as a flaky
# "Element not found" on the first interaction.
- extendedWaitUntil:
    visible:
      id: "message-input"
    timeout: 30000
- tapOn:
    id: "message-input"
- inputText: "prize claim click http://evil.example"
- tapOn:
    id: "check-button"
- assertVisible:
    id: "verdict"
- tapOn:
    id: "report-button"
- assertVisible:
    id: "report-confirmation"
